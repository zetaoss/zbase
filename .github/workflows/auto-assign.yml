name: auto-assign

on:
  issues:
    types:
      - opened
  pull_request_target:
    types:
      - opened

permissions:
  issues: write
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign jmnote
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber =
              context.payload.issue?.number ?? context.payload.pull_request?.number;

            if (!issueNumber) {
              core.info('Skip: no issue or pull request number found.');
              return;
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: ['jmnote'],
            });
