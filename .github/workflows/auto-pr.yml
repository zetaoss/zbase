name: auto-pr

on:
  push:
    branches:
      - "**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  create-or-update-pr:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
    steps:
      - name: Create or update PR
        run: |
          set -euo pipefail

          if [ "$GITHUB_ACTOR" = "dependabot[bot]" ] || [ -z "$GH_TOKEN" ]; then
            echo "Skip auto-pr: actor=$GITHUB_ACTOR, token_present=$([ -n "$GH_TOKEN" ] && echo true || echo false)"
            exit 0
          fi

          if [ "$GITHUB_REF_NAME" = "$BASE_BRANCH" ]; then
            echo "Skip auto-pr: head=$GITHUB_REF_NAME, base=$BASE_BRANCH"
            exit 0
          fi

          if [ -z "$HEAD_COMMIT_MESSAGE" ]; then
            echo "Skip auto-pr: head_commit is null."
            exit 0
          fi

          title="$(printf '%s\n' "$HEAD_COMMIT_MESSAGE" | sed -n '1s/[[:space:]]*$//p')"
          [ -n "$title" ] || title="$GITHUB_REF_NAME"

          body=$(cat <<EOF
          This PR was created automatically on push.

          - Head: \`$GITHUB_REF_NAME\`
          - Base: \`$BASE_BRANCH\`
          - Commit: $GITHUB_SHA
          EOF
          )

          pr_number="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$GITHUB_REF_NAME" \
            --base "$BASE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --body "$body"
            echo "Updated PR #$pr_number"
          else
            pr_url="$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "$BASE_BRANCH" \
              --head "$GITHUB_REF_NAME" \
              --title "$title" \
              --body "$body")"
            pr_number="${pr_url##*/}"
            echo "Created PR #$pr_number"
          fi
